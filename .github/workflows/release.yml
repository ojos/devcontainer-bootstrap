name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify syntax
        run: |
          bash -n bootstrap.sh
          bash -n doctor.sh

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Shellcheck
        run: |
          shellcheck -x bootstrap.sh
          shellcheck -x doctor.sh

      - name: Generate checksum
        run: |
          sha256sum bootstrap.sh doctor.sh > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "devcontainer-bootstrap $TAG" \
            --notes "## Installation

          \`\`\`bash
          curl -sSL https://github.com/\${{ github.repository }}/releases/download/${TAG}/bootstrap.sh -o bootstrap.sh
          # Verify checksum (recommended)
          curl -sSL https://github.com/\${{ github.repository }}/releases/download/${TAG}/SHA256SUMS | sha256sum -c
          bash bootstrap.sh --project-name myapp --languages node,go --mode standard
          \`\`\`" \
            bootstrap.sh \
            doctor.sh \
            SHA256SUMS
